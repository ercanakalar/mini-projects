[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["web", "router"] }
ui = { workspace = true }
uuid = { version = "1", features = ["v4", "serde", "js"] }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server"]
